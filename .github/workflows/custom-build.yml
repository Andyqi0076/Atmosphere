name: Custom Atmosphere Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
      
      - name: Install libnx
        run: |
          dkp-pacman -S --noconfirm switch-libnx || echo "Using pre-installed libnx"
        continue-on-error: true
      
      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          make -j$(nproc)
      
      - name: Package
        if: success()
        run: |
          mkdir -p upload
          cp -r out/* upload/ 2>/dev/null || true
          ls -la upload/
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Atmosphere-Build
          path: upload/
          retention-days: 30
