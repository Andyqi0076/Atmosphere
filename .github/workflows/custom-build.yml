name: Custom Atmosphere Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install devkitPro
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q https://github.com/devkitPro/pacman/releases/latest/download/devkitpro-pacman.amd64.deb
          sudo dpkg -i devkitpro-pacman.amd64.deb || sudo apt-get install -f -y
          sudo dkp-pacman -S --noconfirm devkitA64 switch-libnx switch-mbedtls
      
      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITPRO/tools/bin:$PATH
          make -j$(nproc)
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Atmosphere-Build
          path: out/
          retention-days: 30
