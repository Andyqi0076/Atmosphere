name: Custom Atmosphere Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      # 关键：设置环境变量
      - name: Setup devkitPro environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "DEVKITPPC=/opt/devkitpro/devkitPPC" >> $GITHUB_ENV
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH
      
      # 关键：安装所有依赖库
      - name: Install devkitPro packages
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm \
            switch-dev \
            switch-libnx \
            switch-mbedtls \
            switch-libjpeg-turbo \
            switch-libwebp \
            switch-zlib \
            switch-libpng \
            switch-freetype \
            switch-libdrm_nouveau \
            devkitARM \
            libnx
      
      # 验证环境
      - name: Check environment
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          ls -la $DEVKITPRO || echo "DEVKITPRO not found"
          which aarch64-none-elf-gcc || echo "gcc not found"
      
      - name: Build
        run: |
          make -j$(nproc)
      
      - name: Package
        if: success()
        run: |
          mkdir -p upload
          cp -r out/* upload/ 2>/dev/null || true
          ls -la upload/
      
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Atmosphere-Build
          path: upload/
          retention-days: 30
