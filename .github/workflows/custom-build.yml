name: Custom Atmosphere Build

on:
  # 手动触发（推荐，想编译时点一下）
  workflow_dispatch:
  
  # 或者每次 push 代码时自动触发
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    
    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      # 编译 Atmosphere
      - name: Build Atmosphere
        run: |
          make -j$(nproc)
      
      # 打包编译结果
      - name: Package build
        run: |
          mkdir -p upload
          cp -r out/* upload/ 2>/dev/null || true
          ls -la upload/
      
      # 上传编译产物（可在 Actions 页面下载）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Atmosphere-Custom-Build-${{ github.run_number }}
          path: upload/
          retention-days: 30
      
      # 可选：自动创建 Release（需要设置权限）
      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: custom-v1.11.1-${{ github.run_number }}
          name: Custom Build v1.11.1 #${{ github.run_number }}
          body: |
            自动编译的 Atmosphere 自定义版本
            - 基于最新 master 分支
            - 支持 HOS 22.1.0
            - 编译时间：${{ github.event.head_commit.timestamp }}
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
