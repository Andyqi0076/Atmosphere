name: Custom Atmosphere Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install devkitPro
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          
          # 直接下载特定版本的 deb 包
          wget -q "https://github.com/devkitPro/pacman/releases/download/v2.2.2/devkitpro-pacman.amd64.deb" -O devkitpro.deb
          
          # 强制安装，忽略依赖
          sudo dpkg -i --force-depends devkitpro.deb || true
          sudo apt-get install -f -y
          
          # 初始化 pacman
          sudo /opt/devkitpro/pacman/bin/dkp-pacman-key --init || true
          sudo /opt/devkitpro/pacman/bin/dkp-pacman-key --populate devkitpro || true
          sudo /opt/devkitpro/pacman/bin/dkp-pacman -Syy --noconfirm || true
          
          # 安装编译工具
          sudo /opt/devkitpro/pacman/bin/dkp-pacman -S --noconfirm devkitA64 switch-libnx switch-mbedtls || true
      
      - name: Setup and Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH=$DEVKITPRO/tools/bin:$PATH
          
          # 检查是否安装成功
          which aarch64-none-elf-gcc || echo "GCC not found"
          ls -la $DEVKITPRO/libnx/lib/ 2>/dev/null || echo "libnx not found"
          
          make -j$(nproc)
      
      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Atmosphere-Build
          path: out/
          retention-days: 30
